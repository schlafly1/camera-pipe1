x-deepstream: &deepstream
  build: .
  image: cam1-deepstream
  runtime: nvidia
  network_mode: host
  privileged: true
  volumes:
    - /tmp/.X11-unix:/tmp/.X11-unix
    - /etc/X11:/etc/X11
    - /home/roger/.Xauthority:/root/.Xauthority:ro
    - .:/workspace
  working_dir: /workspace
  stdin_open: true
  tty: true
  command: sleep infinity
  depends_on:
    chromadb:
      condition: service_healthy

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  deepstream-cam1:
    <<: *deepstream
    environment:
      DISPLAY: "${DISPLAY:-:1}"
      XAUTHORITY: /root/.Xauthority
      NVIDIA_DRIVER_CAPABILITIES: all
      CAMERA_ID: "1"
      RTSP_URL: "${RTSP_URL_CAM1}"
      VLM_MODEL: "${VLM_MODEL:-gemma4:26b}"
      RTSP_TRANSPORT: "${RTSP_TRANSPORT_CAM1:-0}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://localhost:11434}"

  deepstream-cam2:
    <<: *deepstream
    environment:
      DISPLAY: "${DISPLAY:-:1}"
      XAUTHORITY: /root/.Xauthority
      NVIDIA_DRIVER_CAPABILITIES: all
      CAMERA_ID: "2"
      RTSP_URL: "${RTSP_URL_CAM2}"
      VLM_MODEL: "${VLM_MODEL:-gemma4:26b}"
      RTSP_TRANSPORT: "${RTSP_TRANSPORT_CAM2:-0}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://localhost:11434}"

  deepstream-cam3:
    <<: *deepstream
    environment:
      DISPLAY: "${DISPLAY:-:1}"
      XAUTHORITY: /root/.Xauthority
      NVIDIA_DRIVER_CAPABILITIES: all
      CAMERA_ID: "3"
      RTSP_URL: "${RTSP_URL_CAM3}"
      VLM_MODEL: "${VLM_MODEL:-gemma4:26b}"
      RTSP_TRANSPORT: "${RTSP_TRANSPORT_CAM3:-0}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://localhost:11434}"

  deepstream-cam4:
    <<: *deepstream
    environment:
      DISPLAY: "${DISPLAY:-:1}"
      XAUTHORITY: /root/.Xauthority
      NVIDIA_DRIVER_CAPABILITIES: all
      CAMERA_ID: "4"
      RTSP_URL: "${RTSP_URL_CAM4}"
      VLM_MODEL: "${VLM_MODEL:-gemma4:26b}"
      RTSP_TRANSPORT: "${RTSP_TRANSPORT_CAM4:-0}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://localhost:11434}"
